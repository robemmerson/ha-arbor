name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master (2026-04-19)

  hacs:
    name: hacs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Run HACS validation
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main (2026-04-19)
        with:
          category: integration
          # Brand icons ship locally under custom_components/arbor/brand/ via
          # the HA 2026.3 bundled-brands mechanism
          # (https://developers.home-assistant.io/blog/2026/02/24/brands-proxy-api/).
          # home-assistant/brands no longer accepts PRs for custom integrations,
          # so the HACS CDN-backed brands check cannot pass; keep it ignored.
          ignore: brands
