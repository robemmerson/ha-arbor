name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: pip install "bandit[toml]==1.7.10"

      - name: Run Bandit
        run: bandit -r custom_components/ -c pyproject.toml

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.13"

      - name: Extract requirements from manifest
        run: |
          python - <<'PY'
          import json
          with open("custom_components/arbor/manifest.json") as f:
              manifest = json.load(f)
          reqs = manifest.get("requirements", [])
          with open("ci-requirements.txt", "w") as f:
              f.write("\n".join(reqs) + "\n")
          print("Wrote ci-requirements.txt:")
          print(open("ci-requirements.txt").read())
          PY

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@cacd3dd45fe3a9a642879295a26765cdf4f1162d # v1.1.0
        with:
          inputs: ci-requirements.txt

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814 # v2 (2026-04-19)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
